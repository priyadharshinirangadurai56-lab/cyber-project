<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Link Detection & Simulation System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="background"></div>
    <div class="particles" id="particlesContainer"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">⚔ SHIELD PROTOCOL ⚔</div>
            <h1 class="title">PHISHING LINK DETECTOR</h1>
            <p class="subtitle">Advanced Threat Analysis System</p>
        </div>

        <!-- Main Interface -->
        <div class="interface-wrapper">
            <!-- Left: Radar Section -->
            <div class="radar-section">
                <div class="radar">
                    <div class="radar-sweep"></div>
                    <div class="radar-center"></div>
                </div>
                <div class="status-text" id="radarStatus">SYSTEM READY</div>
            </div>

            <!-- Right: Input and Results Section -->
            <div class="input-section">
                <!-- Input Container -->
                <div class="input-container" id="inputContainer">
                    <label class="input-label">Enter Link / URL</label>
                    <input 
                        type="text" 
                        class="input-field" 
                        id="urlInput" 
                        placeholder="https://example.com or any text..."
                        autocomplete="off"
                    >
                    <div class="ai-text" id="aiText"></div>
                </div>

                <!-- Button Container -->
                <div class="button-container">
                    <button class="scan-button" id="scanBtn">🔍 ANALYZE</button>
                    <button class="clear-button" id="clearBtn">CLEAR</button>
                </div>
            </div>
        </div>

        <!-- Result Panel -->
        <div class="result-container">
            <div class="scanning-animation" id="scanningAnimation"></div>
            <div class="result-panel" id="resultPanel">
                <div class="status-indicator" id="statusIndicator"></div>
                <div class="status-label" id="statusLabel"></div>
                <div class="status-details" id="statusDetails"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
